version: '3.8'

services:
  bot:
    build: .
    env_file: .env
    depends_on:
      postgres:
        condition: service_healthy
    restart: unless-stopped
    volumes:
      - ./logs:/app/logs

  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: bagabet_bot
      POSTGRES_USER: bagabet
      POSTGRES_PASSWORD: secret
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U bagabet -d bagabet_bot"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  pgdata:
